<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportAuth — Login & Registration</title>

    <!-- Google Sign-In -->
    <meta name="google-signin-client_id" content="325617352352-35cb8fe0pnb23otuk389g5ojflro5cau.apps.googleusercontent.com">
    <script src="https://apis.google.com/js/platform.js" async defer></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            position: relative;
            overflow: hidden;
        }

        /* ===== BACKGROUND IMAGE (Nike Shoe Ad) ===== */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            background: url('https://i.ibb.co/rGqyzm0k/d60c40198cc9e9f1d976f964ae640e7f-webp.webp') center center / cover no-repeat;
            filter: brightness(0.5) saturate(0.8);
            transform: scale(1.05);
            animation: slowZoom 20s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1.05); }
            to { transform: scale(1.15); }
        }

        /* Dark overlay for readability */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        /* ===== SPORT DECORATIVE ELEMENTS ===== */
        .sport-accent {
            position: fixed;
            z-index: 1;
            pointer-events: none;
        }

        .accent-line-1 {
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #6c63ff, #4834d4, #6c63ff, transparent);
            animation: accentPulse 3s ease-in-out infinite;
        }

        .accent-line-2 {
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #6c63ff, #4834d4, #6c63ff, transparent);
            animation: accentPulse 3s ease-in-out infinite reverse;
        }

        @keyframes accentPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* Speed lines */
        .speed-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .speed-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(108, 99, 255, 0.08), transparent);
            width: 100%;
            animation: speedLineMove 8s linear infinite;
        }

        .speed-line:nth-child(1) { top: 15%; animation-delay: 0s; }
        .speed-line:nth-child(2) { top: 35%; animation-delay: -2s; }
        .speed-line:nth-child(3) { top: 55%; animation-delay: -4s; }
        .speed-line:nth-child(4) { top: 75%; animation-delay: -6s; }

        @keyframes speedLineMove {
            0% { transform: translateX(-100%); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        /* Floating shoe silhouette */
        .shoe-silhouette {
            position: fixed;
            right: -80px;
            bottom: -40px;
            z-index: 1;
            pointer-events: none;
            font-size: 300px;
            color: rgba(108, 99, 255, 0.04);
            transform: rotate(-20deg);
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            width: 1000px;
            max-width: 95vw;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* ===== LEFT BRAND PANEL ===== */
        .left-panel {
            flex: 1;
            padding: 60px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            min-height: 560px;
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.03), transparent);
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(108, 99, 255, 0.2);
            background: rgba(108, 99, 255, 0.08);
            color: #6c63ff;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            width: fit-content;
        }

        .brand-badge i {
            font-size: 14px;
        }

        .brand h1 {
            color: #fff;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .brand h1 span {
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand .tagline {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            font-weight: 300;
            margin-bottom: 40px;
        }

        /* Stat cards */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 320px;
        }

        .stat-card {
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s;
        }

        .stat-card:hover {
            background: rgba(108, 99, 255, 0.06);
            border-color: rgba(108, 99, 255, 0.15);
        }

        .stat-card .num {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
        }

        .stat-card .label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-top: 2px;
        }

        /* ===== RIGHT FORM PANEL ===== */
        .right-panel {
            width: 460px;
            padding: 50px 45px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-left: 1px solid rgba(255, 255, 255, 0.04);
        }

        .right-panel h2 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .right-panel .subtitle {
            color: rgba(255, 255, 255, 0.35);
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .tab-bar button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.4s;
        }

        .tab-bar button.active {
            background: linear-gradient(135deg, #6c63ff, #4834d4);
            color: #fff;
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.25);
        }

        .tab-bar button:hover:not(.active) {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-panel { display: none; animation: fadeIn 0.4s ease; }
        .form-panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 0 14px;
            transition: all 0.3s;
        }

        .input-wrap:focus-within {
            border-color: rgba(108, 99, 255, 0.4);
            box-shadow: 0 0 25px rgba(108, 99, 255, 0.08);
            background: rgba(108, 99, 255, 0.04);
        }

        .input-wrap i {
            color: rgba(255, 255, 255, 0.15);
            font-size: 14px;
            width: 18px;
        }

        .input-wrap input {
            width: 100%;
            padding: 13px 10px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.12);
        }

        .password-field .toggle-pass {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            transition: color 0.3s;
        }

        .password-field .toggle-pass:hover {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .form-options label {
            color: rgba(255, 255, 255, 0.35);
            display: flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
        }

        .form-options label input { accent-color: #6c63ff; }

        .form-options a {
            color: #6c63ff;
            text-decoration: none;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .form-options a:hover {
            text-shadow: 0 0 20px rgba(108, 99, 255, 0.4);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c63ff, #4834d4);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transition: left 0.6s;
        }

        .btn-primary:hover::before { left: 100%; }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(108, 99, 255, 0.35);
        }

        .btn-primary:active { transform: translateY(0); }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: rgba(255, 255, 255, 0.12);
            font-size: 12px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.04);
        }

        .divider span { padding: 0 15px; }

        .g-signin2 {
            display: flex;
            justify-content: center;
        }

        /* ===== OTP ===== */
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-inputs input {
            width: 48px;
            height: 54px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }

        .otp-inputs input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 25px rgba(108, 99, 255, 0.15);
        }

        .hidden { display: none !important; }

        .info-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            text-align: center;
            margin-bottom: 12px;
        }

        .resend-otp {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
        }

        .resend-otp a {
            color: #6c63ff;
            cursor: pointer;
            text-decoration: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                max-width: 480px;
            }
            .left-panel {
                padding: 40px 30px;
                min-height: auto;
            }
            .right-panel {
                width: 100%;
                padding: 35px 30px;
                border-left: none;
                border-top: 1px solid rgba(255, 255, 255, 0.04);
            }
            .brand h1 { font-size: 32px; }
            .shoe-silhouette { display: none; }
        }

        @media (max-width: 480px) {
            .right-panel { padding: 25px 20px; }
            .left-panel { padding: 30px 20px; }
            .stats { grid-template-columns: 1fr 1fr; gap: 8px; }
            .otp-inputs input { width: 40px; height: 46px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <!-- Background Image -->
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>

    <!-- Sport Accents -->
    <div class="sport-accent accent-line-1"></div>
    <div class="sport-accent accent-line-2"></div>
    
    <div class="speed-lines">
        <div class="speed-line"></div>
        <div class="speed-line"></div>
        <div class="speed-line"></div>
        <div class="speed-line"></div>
    </div>

    <div class="shoe-silhouette"><i class="fas fa-running"></i></div>

    <!-- ===== MAIN CONTAINER ===== -->
    <div class="main-container">

        <!-- LEFT PANEL -->
        <div class="left-panel">
            <div class="brand-badge">
                <i class="fas fa-bolt"></i> New Generation
            </div>
            <div class="brand">
                <h1>SPORT<br><span>AUTH</span></h1>
                <p class="tagline">Performance meets security</p>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="num">10K+</div>
                    <div class="label">Active Users</div>
                </div>
                <div class="stat-card">
                    <div class="num">99.9%</div>
                    <div class="label">Uptime</div>
                </div>
                <div class="stat-card">
                    <div class="num">150+</div>
                    <div class="label">Countries</div>
                </div>
                <div class="stat-card">
                    <div class="num">4.9★</div>
                    <div class="label">User Rating</div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel">
            <h2>Welcome</h2>
            <p class="subtitle">Sign in or create your sport account</p>

            <div class="tab-bar">
                <button class="active" onclick="switchTab('login')">Sign In</button>
                <button onclick="switchTab('register')">Register</button>
                <button onclick="switchTab('forgot')">Forgot</button>
            </div>

            <!-- LOGIN -->
            <div id="form-login" class="form-panel active">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="you@example.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap password-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-pass" placeholder="Enter password">
                        <button class="toggle-pass" onclick="togglePass('login-pass',this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-options">
                    <label><input type="checkbox" checked> Remember me</label>
                    <a onclick="switchTab('forgot')">Forgot?</a>
                </div>
                <button class="btn-primary" onclick="handleLogin()">Sign In</button>
                <div class="divider"><span>OR</span></div>
                <div class="g-signin2" data-onsuccess="onGoogleSignIn" data-theme="dark"></div>
            </div>

            <!-- REGISTER -->
            <div id="form-register" class="form-panel">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-name" placeholder="John Doe">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="you@example.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap password-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-pass" placeholder="Create password">
                        <button class="toggle-pass" onclick="togglePass('reg-pass',this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm</label>
                    <div class="input-wrap password-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-confirm" placeholder="Confirm password">
                        <button class="toggle-pass" onclick="togglePass('reg-confirm',this)"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-options">
                    <label><input type="checkbox" id="reg-terms"> I agree to the <a href="#">Terms</a></label>
                </div>
                <button class="btn-primary" onclick="handleRegister()">Create Account</button>
                <div class="divider"><span>OR</span></div>
                <div class="g-signin2" data-onsuccess="onGoogleSignIn" data-theme="dark"></div>
            </div>

            <!-- FORGOT / OTP -->
            <div id="form-forgot" class="form-panel">
                <div id="forgot-step-1">
                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="forgot-email" placeholder="Registered email">
                        </div>
                    </div>
                    <button class="btn-primary" onclick="sendOtp()">Send OTP</button>
                </div>
                <div id="forgot-step-2" class="hidden">
                    <p class="info-text">Enter the 6-digit code sent to your email</p>
                    <div class="otp-inputs">
                        <input type="text" maxlength="1" oninput="otpMove(this,0)" onkeydown="otpBack(this,0)">
                        <input type="text" maxlength="1" oninput="otpMove(this,1)" onkeydown="otpBack(this,1)">
                        <input type="text" maxlength="1" oninput="otpMove(this,2)" onkeydown="otpBack(this,2)">
                        <input type="text" maxlength="1" oninput="otpMove(this,3)" onkeydown="otpBack(this,3)">
                        <input type="text" maxlength="1" oninput="otpMove(this,4)" onkeydown="otpBack(this,4)">
                        <input type="text" maxlength="1" oninput="otpMove(this,5)" onkeydown="otpBack(this,5)">
                    </div>
                    <button class="btn-primary" onclick="verifyOtp()">Verify</button>
                    <div class="resend-otp">Didn't receive? <a onclick="sendOtp()">Resend</a></div>
                </div>
                <div id="forgot-step-3" class="hidden">
                    <div class="form-group">
                        <label>New Password</label>
                        <div class="input-wrap password-field">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="reset-pass" placeholder="New password">
                            <button class="toggle-pass" onclick="togglePass('reset-pass',this)"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm</label>
                        <div class="input-wrap password-field">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="reset-confirm" placeholder="Confirm password">
                            <button class="toggle-pass" onclick="togglePass('reset-confirm',this)"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <button class="btn-primary" onclick="handleReset()">Reset Password</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== TAB SWITCHING =====
        function switchTab(tab) {
            document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));

            const tabMap = { login: 0, register: 1, forgot: 2 };
            document.querySelectorAll('.tab-bar button')[tabMap[tab]].classList.add('active');
            document.getElementById('form-' + tab).classList.add('active');
            
            if (tab !== 'forgot') resetForgot();
        }

        function resetForgot() {
            document.getElementById('forgot-step-1').classList.remove('hidden');
            document.getElementById('forgot-step-2').classList.add('hidden');
            document.getElementById('forgot-step-3').classList.add('hidden');
        }

        // ===== PASSWORD TOGGLE =====
        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            if (inp.type === 'password') {
                inp.type = 'text';
                btn.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                inp.type = 'password';
                btn.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }

        // ===== LOGIN =====
        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if (!email || !pass) return alert('Please fill all fields.');
            alert(`Welcome back, ${email}!`);
        }

        // ===== REGISTER =====
        function handleRegister() {
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;
            const terms = document.getElementById('reg-terms').checked;
            if (!name || !email || !pass || !confirm) return alert('Fill all fields.');
            if (pass !== confirm) return alert('Passwords do not match.');
            if (pass.length < 6) return alert('Password must be at least 6 characters.');
            if (!terms) return alert('You must agree to the Terms.');
            alert(`Account created for ${name}!`);
        }

        // ===== OTP =====
        function sendOtp() {
            const email = document.getElementById('forgot-email').value;
            if (!email) return alert('Enter your email address.');
            document.getElementById('forgot-step-1').classList.add('hidden');
            document.getElementById('forgot-step-2').classList.remove('hidden');
            const first = document.querySelector('#forgot-step-2 .otp-inputs input');
            if (first) first.focus();
            alert(`OTP sent to ${email}`);
        }

        function otpMove(inp, idx) {
            if (inp.value.length === 1 && idx < 5) {
                const next = inp.parentElement.children[idx + 1];
                if (next) next.focus();
            }
            const all = document.querySelectorAll('#forgot-step-2 .otp-inputs input');
            let filled = true;
            all.forEach(i => { if (!i.value) filled = false; });
            if (filled) verifyOtp();
        }

        function otpBack(inp, idx) {
            if (event.key === 'Backspace' && !inp.value && idx > 0) {
                const prev = inp.parentElement.children[idx - 1];
                if (prev) prev.focus();
            }
        }

        function verifyOtp() {
            const inputs = document.querySelectorAll('#forgot-step-2 .otp-inputs input');
            let otp = '';
            inputs.forEach(i => otp += i.value);
            if (otp.length !== 6) return alert('Enter the full 6-digit OTP.');
            document.getElementById('forgot-step-2').classList.add('hidden');
            document.getElementById('forgot-step-3').classList.remove('hidden');
        }

        function handleReset() {
            const pass = document.getElementById('reset-pass').value;
            const confirm = document.getElementById('reset-confirm').value;
            if (!pass || !confirm) return alert('Fill all fields.');
            if (pass !== confirm) return alert('Passwords do not match.');
            if (pass.length < 6) return alert('Password too short.');
            alert('Password reset successfully!');
            switchTab('login');
        }

        // ===== GOOGLE SIGN-IN =====
        function onGoogleSignIn(googleUser) {
            const profile = googleUser.getBasicProfile();
            alert(`Google sign-in: ${profile.getName()} — ${profile.getEmail()}`);
        }

        // ===== ENTER KEY SUPPORT =====
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const active = document.querySelector('.form-panel.active');
            if (!active) return;
            if (active.id === 'form-login') handleLogin();
            else if (active.id === 'form-register') handleRegister();
            else if (active.id === 'form-forgot') {
                if (!document.getElementById('forgot-step-1').classList.contains('hidden')) sendOtp();
                else if (!document.getElementById('forgot-step-2').classList.contains('hidden')) verifyOtp();
                else handleReset();
            }
        });
    </script>
</body>
</html>
